name: CI
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install deps
        run: uv sync --locked

      - name: Lint
        run: bash scripts/check_ci.sh lint

      - name: Format (check)
        run: bash scripts/check_ci.sh fmt-check

      - name: Test
        run: bash scripts/check_ci.sh test
